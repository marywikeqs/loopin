<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoopIn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;padding:16px;min-height:100vh}
.header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #30363d}
.header-icon{font-size:20px}
.header-title{font-size:14px;font-weight:700;letter-spacing:.5px}
.label{font-size:9px;font-weight:700;letter-spacing:.8px;color:#7d8590;margin-bottom:6px}
.channel-select{width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px;padding:8px 10px;outline:none;margin-bottom:14px;cursor:pointer}
.channel-select:focus{border-color:#4a154b}
.templates{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tmpl-btn{background:#161b22;border:1px solid #30363d;color:#c9d1d9;font-size:10px;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
.tmpl-btn:hover{border-color:#4a154b;color:#e6edf3}
textarea{width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px;line-height:1.55;padding:10px;resize:vertical;min-height:140px;outline:none;font-family:inherit}
textarea:focus{border-color:#4a154b}
.char-count{text-align:right;font-size:9px;color:#7d8590;margin-top:3px;margin-bottom:12px}
.send-btn{width:100%;background:#4a154b;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;padding:10px;cursor:pointer;transition:background .15s;letter-spacing:.3px}
.send-btn:hover:not(:disabled){background:#611f69}
.send-btn:disabled{background:#30363d;color:#7d8590;cursor:default}
.status{margin-top:10px;font-size:11px;padding:8px 10px;border-radius:5px;display:none}
.status.ok{display:block;background:#0d2818;color:#3fb950;border:1px solid #238636}
.status.err{display:block;background:#2d1216;color:#f85149;border:1px solid #f85149}
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">🔁</span>
  <span class="header-title">LOOPIN</span>
</div>

<div class="label">SEND TO</div>
<select class="channel-select" id="channel-select">
  <option value="test">Test Channel</option>
  <option value="sales_leadership">Sales Leadership</option>
</select>

<div class="label">QUICK TEMPLATES</div>
<div class="templates">
  <button class="tmpl-btn" onclick="useTemplate('update')">📊 Dashboard Update</button>
  <button class="tmpl-btn" onclick="useTemplate('sprint')">🏃 Sprint Summary</button>
  <button class="tmpl-btn" onclick="useTemplate('golive')">🎉 Gone Live</button>
</div>

<div class="label">MESSAGE</div>
<textarea id="message" placeholder="Type your message..." oninput="updateCount()"></textarea>
<div class="char-count"><span id="char-count">0</span> characters</div>

<button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
<div class="status" id="status"></div>

<script>
const TEMPLATES = {
  update:  '📊 *Salesforce Projects Dashboard Updated*\n\nThe latest sprint data is now live. Check current sprint capacity, project states, and upcoming releases.',
  sprint:  '🏃 *Sprint Update — Quilt Software*\n\nSprint planning has been updated. Review what\'s in flight, what\'s in prep, and what\'s on deck for upcoming sprints.',
  golive:  '🎉 *Projects Gone Live*\n\nNew projects have been marked as Gone Live! View the full release history on the dashboard.'
};

function useTemplate(key) {
  document.getElementById('message').value = TEMPLATES[key];
  updateCount();
}

function updateCount() {
  document.getElementById('char-count').textContent = document.getElementById('message').value.length;
}

async function sendMessage() {
  const channel = document.getElementById('channel-select').value;
  const msg     = document.getElementById('message').value.trim();
  if (!msg) { showStatus('err', 'Message cannot be empty.'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const res = await fetch('/.netlify/functions/send-slack', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel, message: msg })
    });

    const data = await res.json();
    if (res.ok && data.ok) {
      const label = document.getElementById('channel-select').selectedOptions[0].text;
      showStatus('ok', '✓ Sent to ' + label);
      document.getElementById('message').value = '';
      updateCount();
    } else {
      showStatus('err', data.error || 'Something went wrong.');
    }
  } catch(e) {
    showStatus('err', 'Failed to send. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send';
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}
</script>
</body>
</html>
